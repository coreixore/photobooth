<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth Pro</title>
    <style>
        /* CSS UNTUK TAMPILAN */
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { color: #00d2ff; }

        video {
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            background: #000;
            transform: scaleX(-1); /* Mirror view */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-start { background: #00d2ff; color: white; }
        .btn-capture { background: #ff512f; color: white; }
        
        /* Area Edit */
        #edit-section {
            display: none; /* Sembunyi sebelum ada foto */
            background: #333;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }

        .filter-buttons {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .filter-buttons button {
            font-size: 12px;
            background: #555;
            color: white;
        }

        #photo {
            width: 100%;
            max-width: 400px;
            margin-top: 15px;
            border: 3px solid white;
            border-radius: 10px;
            transform: scaleX(-1); /* Biar hasil foto gak kebalik */
        }

        label { display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1>Photobooth</h1>

    <video id="video" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div class="controls">
        <button class="btn-start" onclick="startCamera()">Start Camera</button>
        <button class="btn-capture" onclick="capturePhoto()">Capture</button>
    </div>

    <div id="edit-section">
        <h3>Hasil & Edit:</h3>
        
        <div class="filter-buttons">
            <button onclick="applyFilter('none')">Normal</button>
            <button onclick="applyFilter('grayscale(100%)')">B&W</button>
            <button onclick="applyFilter('sepia(100%)')">Sepia</button>
            <button onclick="applyFilter('invert(100%)')">Invert</button>
            <button onclick="applyFilter('hue-rotate(90deg)')">Magic</button>
        </div>

        <label for="brightness">Kecerahan:</label>
        <input type="range" id="brightness" min="0" max="200" value="100" oninput="updateFilters()">
        
        <br>
        <img id="photo" src="" alt="Hasil jepretan">
    </div>

    <script>
        // JAVASCRIPT LOGIC
        const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const photo = document.getElementById('photo');
const editSection = document.getElementById('edit-section');
const brightnessSlider = document.getElementById('brightness');

// Variabel untuk menyimpan filter warna yang sedang dipilih
let selectedColorFilter = ""; 

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
    } catch (err) {
        alert("Kamera gak bisa nyala. Cek izin browser ya!");
    }
}

function capturePhoto() {
    const context = canvas.getContext('2d');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    context.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    photo.src = canvas.toDataURL('image/png');
    editSection.style.display = 'block';
    
    // Reset semua tampilan ke awal tiap kali motret baru
    selectedColorFilter = ""; 
    brightnessSlider.value = 100;
    photo.style.filter = "none";
}

// FUNGSI INI YANG KITA PERBAIKI
function applyFilter(filter) {
    if (filter === 'none') {
        selectedColorFilter = ""; // Kosongkan filter warna
        brightnessSlider.value = 100; // Balikin terang ke normal
    } else {
        selectedColorFilter = filter; // Simpan filter yang dipilih (B&W, Sepia, dll)
    }
    updateStyle();
}

function updateStyle() {
    const b = brightnessSlider.value;
    // Terapkan filter warna (kalau ada) + kecerahan
    // Kita tidak pakai kata "none" di dalam string filter agar tidak error
    photo.style.filter = `${selectedColorFilter} brightness(${b}%)`.trim();
}
    </script>
</body>
</html>
